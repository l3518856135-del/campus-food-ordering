<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>校园点餐 - 顾客端</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="校园点餐">
  <meta name="theme-color" content="#FF6B35">
  <link rel="manifest" href="/manifest-customer.json">
  <link rel="apple-touch-icon" href="/icons/customer-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==================== 头部 ==================== -->
  <header class="header" id="header">
    <button class="header-back" id="btnBack" style="display:none;">&#8592;</button>
    <span class="header-title" id="headerTitle">校园点餐</span>
    <div class="header-actions">
      <button class="header-addr-btn" id="btnSwitchToMerchant" title="切换到商家版" style="display:none;font-size:13px;background:#2D3436;color:#fff;padding:4px 10px;border-radius:14px;border:none;">📋 商家</button>
      <button class="header-addr-btn" id="btnAddrManage" title="管理收货地址">📍</button>
      <button class="header-addr-btn" id="btnLogout" title="退出登录" style="font-size:14px;">↪</button>
    </div>
  </header>

  <!-- ==================== 区域导航 ==================== -->
  <nav class="area-nav" id="areaNav">
    <!-- JS动态渲染 -->
  </nav>

  <!-- ==================== 页面容器 ==================== -->
  <div class="page active" id="pageStores">
    <div class="store-list" id="storeList"></div>
  </div>

  <div class="page" id="pageMenu">
    <div class="category-nav" id="categoryNav"></div>
    <div class="menu-items" id="menuItems"></div>
  </div>

  <div class="page" id="pageAddress">
    <div id="addressList" style="padding:12px 16px 80px;"></div>
  </div>

  <!-- ==================== 底部导航栏 ==================== -->
  <div class="bottom-nav" id="bottomNav">
    <div class="bottom-nav-item active" data-page="stores">
      <span class="bottom-nav-icon">🏠</span>
      <span class="bottom-nav-label">首页</span>
    </div>
    <div class="bottom-nav-item" data-page="cart" id="bottomNavCart">
      <span class="bottom-nav-icon">🛒</span>
      <span class="bottom-nav-label">购物车</span>
      <span class="bottom-nav-badge" id="bottomCartBadge" style="display:none;">0</span>
    </div>
    <div class="bottom-nav-item" data-page="orders">
      <span class="bottom-nav-icon">📋</span>
      <span class="bottom-nav-label">订单</span>
    </div>
    <div class="bottom-nav-item" data-page="address">
      <span class="bottom-nav-icon">📍</span>
      <span class="bottom-nav-label">地址</span>
    </div>
  </div>

  <!-- ==================== 购物车弹窗 ==================== -->
  <div class="app-modal-overlay" id="cartModal" style="display:none;">
    <div class="app-modal">
      <div class="app-modal-header">
        <span class="app-modal-title">购物车</span>
        <button class="app-modal-btn" id="btnClearCart">清空</button>
      </div>
      <div class="app-modal-body" id="cartBody"></div>
      <div class="app-modal-footer">
        <button class="order-submit-btn" id="btnCheckout">去下单</button>
      </div>
    </div>
  </div>

  <!-- ==================== 订单列表弹窗 ==================== -->
  <div class="app-modal-overlay" id="ordersModal" style="display:none;">
    <div class="app-modal">
      <div class="app-modal-header">
        <span class="app-modal-title">我的订单</span>
        <button class="app-modal-btn" id="btnCloseOrders">关闭</button>
      </div>
      <div class="app-modal-body" id="ordersBody"></div>
    </div>
  </div>

  <!-- ==================== 提交订单弹窗 ==================== -->
  <div class="app-modal-overlay" id="orderModal" style="display:none;">
    <div class="app-modal">
      <div class="app-modal-header">
        <span class="app-modal-title">确认订单</span>
        <button class="app-modal-btn" id="btnCancelOrder">取消</button>
      </div>
      <div class="app-modal-body">
        <div class="order-summary" id="orderSummary"></div>
        <div class="order-form-group">
          <label class="order-form-label">收货地址</label>
          <div class="addr-select-card" id="selectedAddrCard" onclick="showAddrPicker()">
            <div class="addr-select-placeholder" id="addrPlaceholder">
              <span>📍 请选择收货地址</span>
              <span class="store-arrow">›</span>
            </div>
            <div class="addr-select-info" id="addrSelectInfo" style="display:none;">
              <div class="addr-select-top">
                <span class="addr-select-name" id="addrSelectName"></span>
                <span class="addr-select-phone" id="addrSelectPhone"></span>
              </div>
              <div class="addr-select-dorm" id="addrSelectDorm"></div>
            </div>
          </div>
        </div>
        <div class="order-form-group">
          <label class="order-form-label">备注（选填）</label>
          <textarea class="order-form-textarea" id="orderNote" placeholder="如：不要辣、多加醋..."></textarea>
        </div>
      </div>
      <div class="app-modal-footer">
        <button class="order-submit-btn" id="btnSubmitOrder">确认下单</button>
      </div>
    </div>
  </div>

  <!-- ==================== 地址选择器弹窗 ==================== -->
  <div class="app-modal-overlay" id="addrPickerModal" style="display:none;">
    <div class="app-modal">
      <div class="app-modal-header">
        <span class="app-modal-title">选择收货地址</span>
        <button class="app-modal-btn" id="btnCloseAddrPicker">取消</button>
      </div>
      <div class="app-modal-body" id="addrPickerList"></div>
      <div class="app-modal-footer">
        <button class="btn btn-primary" style="width:100%;" id="btnAddAddrInPicker">+ 添加新地址</button>
      </div>
    </div>
  </div>

  <!-- ==================== 地址编辑弹窗 ==================== -->
  <div class="app-modal-overlay" id="addrEditModal" style="display:none;">
    <div class="app-modal">
      <div class="app-modal-header">
        <span class="app-modal-title" id="addrEditTitle">添加收货地址</span>
        <button class="app-modal-btn" id="btnCancelAddrEdit">取消</button>
      </div>
      <div class="app-modal-body">
        <input type="hidden" id="addrEditId">
        <div class="order-form-group">
          <label class="order-form-label">收货人</label>
          <input class="order-form-input" id="addrEditName" placeholder="请输入收货人姓名" maxlength="15">
        </div>
        <div class="order-form-group">
          <label class="order-form-label">联系电话</label>
          <input class="order-form-input" id="addrEditPhone" placeholder="请输入联系电话" maxlength="15" type="tel">
        </div>
        <div class="order-form-group">
          <label class="order-form-label">宿舍楼/地址</label>
          <input class="order-form-input" id="addrEditDorm" placeholder="如：5号楼302" maxlength="30">
        </div>
        <div class="order-form-group" style="display:flex;align-items:center;gap:8px;">
          <input type="checkbox" id="addrEditDefault" style="width:18px;height:18px;">
          <label for="addrEditDefault" style="font-size:13px;color:var(--text-light);">设为默认地址</label>
        </div>
      </div>
      <div class="app-modal-footer">
        <button class="order-submit-btn" id="btnSaveAddr">保存</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/customer.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
