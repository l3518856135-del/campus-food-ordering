<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>校园点餐 - 商家端</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="商家管理">
  <meta name="theme-color" content="#2D3436">
  <link rel="manifest" href="/manifest-merchant.json">
  <link rel="apple-touch-icon" href="/icons/merchant-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==================== 头部 ==================== -->
  <header class="header merchant-header" id="header">
    <span class="header-title">商家管理中心</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="btnSwitchToCustomer" style="background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:13px;padding:4px 10px;border-radius:14px;cursor:pointer;">🛒 顾客版</button>
      <span style="font-size:12px;opacity:0.7;" id="lastRefresh"></span>
      <button id="btnLogout" style="background:none;border:none;color:#fff;font-size:14px;cursor:pointer;">↪</button>
    </div>
  </header>

  <!-- ==================== 顶部导航切换 ==================== -->
  <div class="merchant-tabs" id="merchantTabs">
    <div class="merchant-tab active" data-view="orders">订单管理</div>
    <div class="merchant-tab" data-view="menu">菜单管理</div>
  </div>

  <!-- ==================== 订单管理视图 ==================== -->
  <div class="merchant-view active" id="viewOrders">
    <!-- 统计面板 -->
    <div class="merchant-stats" id="statsPanel">
      <div class="stat-item">
        <div class="stat-num" id="statPending" style="color:#FFD166;">0</div>
        <div class="stat-label">待接单</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statAccepted" style="color:#118AB2;">0</div>
        <div class="stat-label">已接单</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statDelivering" style="color:#FF6B35;">0</div>
        <div class="stat-label">配送中</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statCompleted" style="color:#06D6A0;">0</div>
        <div class="stat-label">已完成</div>
      </div>
    </div>

    <!-- 订单筛选标签 -->
    <div class="order-tabs" id="orderTabs">
      <div class="order-tab active" data-filter="all">全部</div>
      <div class="order-tab" data-filter="pending">待接单<span class="count" id="countPending"></span></div>
      <div class="order-tab" data-filter="accepted">已接单<span class="count" id="countAccepted"></span></div>
      <div class="order-tab" data-filter="delivering">配送中<span class="count" id="countDelivering"></span></div>
      <div class="order-tab" data-filter="completed">已完成<span class="count" id="countCompleted"></span></div>
    </div>

    <!-- 搜索框 -->
    <div class="search-box">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="搜索订单（顾客名/店铺/商品）">
      </div>
    </div>

    <!-- 订单列表 -->
    <div id="orderList" style="padding:12px 16px 80px;"></div>
  </div>

  <!-- ==================== 菜单管理视图 ==================== -->
  <div class="merchant-view" id="viewMenu">
    <!-- 区域选择 -->
    <div class="menu-mgr-nav" id="menuAreaNav">
      <!-- JS动态渲染 -->
    </div>

    <!-- 店铺选择 -->
    <div class="menu-mgr-store-bar" id="menuStoreBar">
      <select class="menu-mgr-select" id="menuStoreSelect">
        <option value="">-- 选择店铺 --</option>
      </select>
      <button class="btn btn-primary btn-sm" id="btnAddStore">+ 添加店铺</button>
    </div>

    <!-- 菜单编辑区 -->
    <div id="menuEditor" style="padding:12px 16px 80px;">
      <div class="empty-state">
        <div class="empty-state-icon">📝</div>
        <div class="empty-state-text">请选择区域和店铺开始管理菜单</div>
      </div>
    </div>
  </div>

  <!-- ==================== 订单详情弹窗 ==================== -->
  <div class="order-modal-overlay" id="detailModal" style="display:none;">
    <div class="order-modal" id="detailContent"></div>
  </div>

  <!-- ==================== 通用输入弹窗 ==================== -->
  <div class="order-modal-overlay" id="inputModal" style="display:none;">
    <div class="order-modal" id="inputContent"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/merchant.js"></script>
  <script src="js/menu-manager.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
